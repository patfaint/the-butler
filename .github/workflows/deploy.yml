name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy The Butler
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euo pipefail
            cd /opt/the-butler/app
            sudo systemctl stop the-butler
            trap 'status=$?; if [[ ${status} -ne 0 ]]; then sudo systemctl start the-butler || true; fi; exit ${status}' EXIT
            git pull --ff-only origin main
            ./.venv/bin/python -m pip install --upgrade pip
            ./.venv/bin/pip install -r requirements.txt
            sudo install -m 0644 the-butler.service /etc/systemd/system/the-butler.service
            sudo systemctl daemon-reload
            sudo systemctl start the-butler
            trap - EXIT
          EOF
